# Life Vault MCP -- self-hosted deployment (Phase 2).
#
# Two services: Postgres+pgvector (the derived index) and the authenticated vault
# HTTP server. The vault Markdown lives in ./vault on the host (the source of
# truth) and is bind-mounted in. Secrets are encrypted at rest using
# VAULT_MASTER_KEY. Copy .env.example to .env and fill the values marked below.
#
# Start:   docker compose up -d
# Token:   docker compose exec vault python scripts/vault_admin.py --rotate-token
# Remote:  expose only over Tailscale -- see docs/DEPLOY.md.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vault}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      VAULT_DB: postgres
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-vault}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vault}
      # Master key encrypts secrets at rest. REQUIRED for a real deployment.
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:?set VAULT_MASTER_KEY in .env}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      VAULT_HOST: 0.0.0.0
      VAULT_PORT: 8765
    volumes:
      - ./vault:/app/vault
    # Bind to localhost on the host; Tailscale handles remote reach (docs/DEPLOY.md).
    # Change to "8765:8765" only if you intentionally expose it on the LAN.
    ports:
      - "127.0.0.1:8765:8765"

volumes:
  pgdata:
